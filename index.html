<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clap Jump</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

canvas{
    background:#222;
    border:3px solid #444;
    margin-top:20px;
    width:90%;
    max-width:900px;
    height:400px;
}

button{
    padding:12px 24px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
}

#status{
    margin-top:10px;
    color:#5cfb6c;
}
</style>
</head>

<body>

<h1>👏 Clap Jump</h1>

<p>拍手即可跳躍躲避障礙物</p>

<button id="startBtn">開始遊戲</button>

<div id="status">等待開始</div>

<br>

<canvas id="game" width="900" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");

let gameRunning = false;

let score = 0;
let speed = 5;

const player = {
    x:80,
    y:300,
    w:40,
    h:40,
    vy:0,
    jumping:false
};

const gravity = 0.7;
const ground = 300;

let obstacles = [];

function jump(){

    if(!player.jumping){

        player.vy = -14;
        player.jumping = true;

    }
}

function updatePlayer(){

    player.vy += gravity;
    player.y += player.vy;

    if(player.y >= ground){

        player.y = ground;
        player.vy = 0;
        player.jumping = false;

    }
}

function drawPlayer(){

    ctx.fillStyle = "#5cfb6c";

    ctx.fillRect(
        player.x,
        player.y,
        player.w,
        player.h
    );
}

function spawnObstacle(){

    obstacles.push({
        x:canvas.width,
        y:290,
        w:30,
        h:50
    });

}

function updateObstacles(){

    for(let i=obstacles.length-1;i>=0;i--){

        obstacles[i].x -= speed;

        if(obstacles[i].x < -50){

            obstacles.splice(i,1);

            score++;

            if(score % 5 === 0){

                speed += 0.5;

            }
        }
    }
}

function drawObstacles(){

    ctx.fillStyle="#ff6b6b";

    obstacles.forEach(o=>{

        ctx.fillRect(
            o.x,
            o.y,
            o.w,
            o.h
        );

    });

}

function checkCollision(){

    for(let o of obstacles){

        if(
            player.x < o.x + o.w &&
            player.x + player.w > o.x &&
            player.y < o.y + o.h &&
            player.y + player.h > o.y
        ){

            gameRunning = false;

            alert(
                "遊戲結束！得分：" + score
            );

            location.reload();

        }
    }
}

let spawnCounter = 0;

function gameLoop(){

    if(!gameRunning) return;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.strokeStyle="#555";

    ctx.beginPath();
    ctx.moveTo(0,340);
    ctx.lineTo(canvas.width,340);
    ctx.stroke();

    spawnCounter++;

    if(spawnCounter > 100){

        spawnObstacle();
        spawnCounter = 0;

    }

    updatePlayer();
    updateObstacles();

    drawPlayer();
    drawObstacles();

    checkCollision();

    ctx.fillStyle="white";
    ctx.font="24px Arial";
    ctx.fillText(
        "Score: " + score,
        20,
        40
    );

    requestAnimationFrame(gameLoop);
}

async function startMic(){

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    const audioContext =
        new AudioContext();

    const source =
        audioContext.createMediaStreamSource(
            stream
        );

    const analyser =
        audioContext.createAnalyser();

    analyser.fftSize = 256;

    source.connect(analyser);

    const data =
        new Uint8Array(
            analyser.frequencyBinCount
        );

    function detectClap(){

        analyser.getByteFrequencyData(
            data
        );

        let volume = 0;

        for(let i=0;i<data.length;i++){

            volume += data[i];

        }

        volume /= data.length;

        if(volume > 70){

            jump();

        }

        requestAnimationFrame(
            detectClap
        );
    }

    detectClap();
}

document
.getElementById("startBtn")
.addEventListener("click",async()=>{

    await startMic();

    statusText.textContent =
        "拍手開始遊戲！";

    gameRunning = true;

    gameLoop();

});

document.addEventListener(
    "keydown",
    e=>{
        if(e.code==="Space"){
            jump();
        }
    }
);

canvas.addEventListener(
    "click",
    jump
);

</script>

</body>
</html>
