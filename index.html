<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>純粹測試 AI 鏡頭</title>
    <style>
      body { font-family: sans-serif; background: #111; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
      .video-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 3/4; background: #333; overflow: hidden; border: 2px solid #5cfb6c; border-radius: 8px; margin-bottom: 20px; }
      video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
      canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
      #status { background: #222; padding: 15px; border-radius: 8px; width: 100%; max-width: 400px; line-height: 1.5; font-size: 1.1rem; }
      button { padding: 12px 24px; font-size: 1.2rem; background: #5cfb6c; color: #111; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px;}
    </style>
  </head>
  <body>
    <h2>🛠️ AI 鏡頭純淨測試</h2>
    <button id="startBtn">1. 點我啟動相機</button>
    
    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>

    <div id="status">
      狀態：請點擊上方按鈕啟動...<br>
      偵測手數：0<br>
      系統訊息：無
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/hands.js"></script>
    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const statusDiv = document.getElementById('status');
      const startBtn = document.getElementById('startBtn');
      let hands;

      function logMsg(msg) {
        console.log(msg);
        let currentText = statusDiv.innerHTML.split('<br>');
        statusDiv.innerHTML = `${currentText[0]}<br>${currentText[1]}<br>系統訊息：${msg}`;
      }

      function updateHandCount(count) {
        let currentText = statusDiv.innerHTML.split('<br>');
        statusDiv.innerHTML = `${currentText[0]}<br>偵測手數：${count} 隻手<br>${currentText[2]}`;
      }

      async function initTest() {
        startBtn.disabled = true;
        logMsg("正在請求相機權限...");
        
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: 640, height: 480 } 
          });
          video.srcObject = stream;
          
          await new Promise(resolve => { video.onloadedmetadata = () => resolve(); });
          await video.play();
          
          canvas.width = video.clientWidth;
          canvas.height = video.clientHeight;
          
          logMsg("相機啟動成功！載入 AI 模型中 (這可能需要幾秒鐘)...");
          
          hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/${file}` });
          hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5, modelComplexity: 0 });
          
          hands.onResults(onResults);
          
          logMsg("AI 模型已載入，開始偵測！請把手放到鏡頭前。");
          statusDiv.innerHTML = statusDiv.innerHTML.replace('狀態：請點擊上方按鈕啟動...', '狀態：🟢 運作中');
          
          processVideo();
        } catch (err) {
          logMsg(`❌ 錯誤：${err.message}`);
          startBtn.disabled = false;
        }
      }

      function onResults(results) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (results.multiHandLandmarks) {
          updateHandCount(results.multiHandLandmarks.length);
          
          // 畫紅點
          ctx.fillStyle = 'red';
          for (const landmarks of results.multiHandLandmarks) {
            let sumX = 0, sumY = 0;
            for (let lm of landmarks) { sumX += lm.x; sumY += lm.y; }
            let x = (1 - (sumX / landmarks.length)) * canvas.width;
            let y = (sumY / landmarks.length) * canvas.height;
            
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
          }
        } else {
          updateHandCount(0);
        }
      }

      async function processVideo() {
        try {
          await hands.send({image: video});
        } catch (e) {
          logMsg(`偵測錯誤: ${e.message}`);
        }
        requestAnimationFrame(processVideo);
      }

      startBtn.addEventListener('click', initTest);
    </script>
  </body>
</html>
