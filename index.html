<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clap Dodge - 拍手閃避遊戲</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; background: #111; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      .container { max-width: 800px; width: 100%; }
      h1 { text-align: center; margin-bottom: 16px; }
      .game-area { position: relative; width: 100%; aspect-ratio: 16/9; background: #1a1a1a; border: 3px solid #444; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
      video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
      canvas { position: absolute; top: 0; left: 0; }
      .ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px; z-index: 100; }
      .score { font-size: 1.5rem; font-weight: bold; color: #5cfb6c; }
      .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border-radius: 12px; text-align: center; z-index: 200; display: none; }
      .game-over h2 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 16px; }
      .game-over p { font-size: 1.2rem; margin-bottom: 12px; }
      .game-over button { padding: 12px 24px; background: #5cfb6c; color: #111; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
      .game-over button:hover { background: #4de559; }
      .hand-indicator { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; gap: 20px; justify-content: center; z-index: 50; }
      .hand { padding: 8px 16px; background: rgba(0,0,0,0.7); border-radius: 4px; font-size: 0.9rem; }
      .hand.active { background: #5cfb6c; color: #111; font-weight: bold; }
      .instructions { background: #222; padding: 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.6; }
      .instructions h3 { color: #5cfb6c; margin-bottom: 8px; }
      .instructions ul { margin-left: 20px; }
      .instructions li { margin: 4px 0; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎮 Clap Dodge - 拍手閃避遊戲</h1>
      
      <div class="instructions">
        <h3>📖 遊戲說明：</h3>
        <ul>
          <li>👋 拍左手 (左手往右移動) → 躲避左邊的障礙物</li>
          <li>👋 拍右手 (右手往左移動) → 躲避右邊的障礙物</li>
          <li>🎯 成功躲避得 1 分</li>
          <li>❌ 被擊中遊戲結束</li>
        </ul>
      </div>

      <div class="game-area">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="ui">
          <div class="score">得分: <span id="score">0</span></div>
        </div>
        <div class="hand-indicator">
          <div class="hand" id="leftHand">👈 左手</div>
          <div class="hand" id="rightHand">右手 👉</div>
        </div>
        <div class="game-over" id="gameOver">
          <h2>遊戲結束！</h2>
          <p>最終得分: <span id="finalScore">0</span></p>
          <button onclick="location.reload()">重新開始</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/hands.js"></script>
    <script>
      const videoElement = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const scoreDisplay = document.getElementById('score');
      const gameOverDiv = document.getElementById('gameOver');
      const finalScoreDisplay = document.getElementById('finalScore');
      const leftHandIndicator = document.getElementById('leftHand');
      const rightHandIndicator = document.getElementById('rightHand');

      // 設置 canvas
      canvas.width = canvas.parentElement.offsetWidth;
      canvas.height = canvas.parentElement.offsetHeight;

      // 遊戲變量
      let hands = null;
      let gameRunning = true;
      let score = 0;
      let playerX = canvas.width / 2;
      const playerWidth = 60;
      const playerHeight = 100;
      let obstacles = [];
      let obstacleSpawnRate = 0.02;
      let gameSpeed = 1;

      // 玩家偵測
      let leftHandPos = null;
      let rightHandPos = null;

      const Obstacle = class {
        constructor(side) {
          this.side = side; // 'left' or 'right'
          this.x = side === 'left' ? -80 : canvas.width;
          this.y = Math.random() * (canvas.height - 100);
          this.width = 80;
          this.height = 100;
          this.speed = 4 + gameSpeed;
        }

        update() {
          if (this.side === 'left') {
            this.x += this.speed;
          } else {
            this.x -= this.speed;
          }
        }

        draw() {
          ctx.fillStyle = '#ff6b6b';
          ctx.fillRect(this.x, this.y, this.width, this.height);
          ctx.strokeStyle = '#ff0000';
          ctx.lineWidth = 2;
          ctx.strokeRect(this.x, this.y, this.width, this.height);
        }

        isOffScreen() {
          return (this.side === 'left' && this.x > canvas.width) ||
                 (this.side === 'right' && this.x + this.width < 0);
        }

        collidesWith(px, py, pw, ph) {
          return !(px + pw < this.x || px > this.x + this.width ||
                   py + ph < this.y || py > this.y + this.height);
        }
      };

      async function initHands() {
        hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/${file}`
        });

        hands.setOptions({
          maxNumHands: 2,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
          modelComplexity: 1
        });
      }

      function getHandPosition(landmarks) {
        if (!landmarks || landmarks.length === 0) return null;
        // 計算手的中心
        let sumX = 0, sumY = 0;
        for (let lm of landmarks) {
          sumX += lm.x;
          sumY += lm.y;
        }
        return {
          x: (sumX / landmarks.length) * canvas.width,
          y: (sumY / landmarks.length) * canvas.height
        };
      }

      function updatePlayerPosition() {
        if (leftHandPos) {
          // 左手在左邊 → 玩家往左移動
          playerX = Math.max(0, leftHandPos.x - playerWidth / 2);
        } else if (rightHandPos) {
          // 右手在右邊 → 玩家往右移動
          playerX = Math.min(canvas.width - playerWidth, rightHandPos.x - playerWidth / 2);
        }
      }

      function drawPlayer() {
        ctx.fillStyle = '#5cfb6c';
        ctx.fillRect(playerX, canvas.height - playerHeight - 20, playerWidth, playerHeight);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 3;
        ctx.strokeRect(playerX, canvas.height - playerHeight - 20, playerWidth, playerHeight);
      }

      function checkCollisions() {
        const playerY = canvas.height - playerHeight - 20;
        for (let i = obstacles.length - 1; i >= 0; i--) {
          if (obstacles[i].collidesWith(playerX, playerY, playerWidth, playerHeight)) {
            endGame();
            return;
          }
        }
      }

      function endGame() {
        gameRunning = false;
        finalScoreDisplay.textContent = score;
        gameOverDiv.style.display = 'block';
      }

      async function processFrame() {
        if (!gameRunning) return;

        try {
          const results = await hands.process(videoElement);
          
          leftHandPos = null;
          rightHandPos = null;
          leftHandIndicator.classList.remove('active');
          rightHandIndicator.classList.remove('active');

          if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            // 判斷是左手還是右手
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
              const handedness = results.multiHandedness[i];
              const label = handedness.label; // 'Left' or 'Right'
              const pos = getHandPosition(results.multiHandLandmarks[i]);

              if (label === 'Left') {
                leftHandPos = pos;
                leftHandIndicator.classList.add('active');
              } else {
                rightHandPos = pos;
                rightHandIndicator.classList.add('active');
              }
            }
          }

          updatePlayerPosition();
        } catch (err) {
          console.error('Detection error:', err);
        }

        requestAnimationFrame(processFrame);
      }

      function gameLoop() {
        if (!gameRunning) return;

        // 清空 canvas
        ctx.fillStyle = 'rgba(26, 26, 26, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 生成障礙物
        if (Math.random() < obstacleSpawnRate) {
          obstacles.push(new Obstacle(Math.random() > 0.5 ? 'left' : 'right'));
        }

        // 更新並繪製障礙物
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].update();
          obstacles[i].draw();

          if (obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
            score++;
            scoreDisplay.textContent = score;
            // 難度增加
            if (score % 5 === 0) {
              gameSpeed += 0.5;
              obstacleSpawnRate += 0.005;
            }
          }
        }

        // 檢查碰撞
        checkCollisions();

        // 繪製玩家
        drawPlayer();

        requestAnimationFrame(gameLoop);
      }

      async function start() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
          });

          videoElement.srcObject = stream;
          videoElement.onloadedmetadata = async () => {
            videoElement.play();
            await initHands();
            processFrame();
            gameLoop();
          };
        } catch (err) {
          alert(`相機錯誤: ${err.message}`);
          console.error('Camera error:', err);
        }
      }

      window.addEventListener('load', start);
      window.addEventListener('resize', () => {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
      });
    </script>
  </body>
</html>
