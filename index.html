<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clap Jump - 拍手跳躍遊戲</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; background: #111; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      .container { max-width: 900px; width: 100%; }
      h1 { text-align: center; margin-bottom: 16px; }
      .game-area { position: relative; width: 100%; aspect-ratio: 16/9; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); border: 3px solid #444; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
      video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; }
      canvas { position: absolute; top: 0; left: 0; }
      .ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px; z-index: 100; }
      .score { font-size: 1.5rem; font-weight: bold; color: #5cfb6c; }
      .info { margin-top: 8px; font-size: 0.9rem; color: #aaa; }
      .game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border-radius: 12px; text-align: center; z-index: 200; display: none; }
      .game-over h2 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 16px; }
      .game-over p { font-size: 1.2rem; margin-bottom: 12px; }
      .game-over button { padding: 12px 24px; background: #5cfb6c; color: #111; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
      .game-over button:hover { background: #4de559; }
      .detector { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; gap: 20px; justify-content: center; z-index: 50; flex-wrap: wrap; }
      .detector-item { padding: 6px 12px; background: rgba(0,0,0,0.7); border-radius: 4px; font-size: 0.8rem; border: 1px solid #555; }
      .detector-item.active { background: #5cfb6c; color: #111; font-weight: bold; border-color: #5cfb6c; }
      .instructions { background: #222; padding: 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; line-height: 1.6; }
      .instructions h3 { color: #5cfb6c; margin-bottom: 8px; }
      .instructions ul { margin-left: 20px; }
      .instructions li { margin: 4px 0; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎮 Clap Jump - 拍手跳躍遊戲</h1>
      
      <div class="instructions">
        <h3>📖 遊戲說明：</h3>
        <ul>
          <li>👋 <strong>快速拍手（兩隻手靠近）= 跳躍</strong></li>
          <li>🦖 躲避從右邊來的紅色障礙物</li>
          <li>🎯 成功躲避得 1 分</li>
          <li>❌ 被擊中遊戲結束</li>
          <li>📈 每 5 分難度加倍</li>
        </ul>
      </div>

      <div class="game-area">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="ui">
          <div class="score">得分: <span id="score">0</span></div>
          <div class="info">速度: <span id="speed">1.0</span>x</div>
        </div>
        <div class="detector">
          <div class="detector-item" id="handDetector">👋 手部偵測: --</div>
        </div>
        <div class="game-over" id="gameOver">
          <h2>遊戲結束！</h2>
          <p>最終得分: <span id="finalScore">0</span></p>
          <button onclick="location.reload()">重新開始</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/hands.js"></script>
    <script>
      const videoElement = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const scoreDisplay = document.getElementById('score');
      const speedDisplay = document.getElementById('speed');
      const gameOverDiv = document.getElementById('gameOver');
      const finalScoreDisplay = document.getElementById('finalScore');
      const handDetectorIndicator = document.getElementById('handDetector');

      // 設置 canvas
      canvas.width = canvas.parentElement.offsetWidth;
      canvas.height = canvas.parentElement.offsetHeight;

      // 遊戲常量
      const GRAVITY = 0.6;
      const GROUND_Y = canvas.height - 120;
      const DINO_WIDTH = 50;
      const DINO_HEIGHT = 50;
      const OBSTACLE_WIDTH = 40;
      const OBSTACLE_HEIGHT = 60;

      // 遊戲變量
      let hands = null;
      let gameRunning = true;
      let score = 0;
      let gameSpeed = 1;
      let obstacles = [];
      let obstacleSpawnCounter = 0;
      let obstacleSpawnRate = 150;

      // 玩家（恐龍）
      let dinoX = 50;
      let dinoY = GROUND_Y;
      let dinoVelocityY = 0;
      let isJumping = false;

      // 偵測變量
      let lastHandDistance = 0;
      let lastHandDistanceTime = 0;
      let handDistanceVelocity = 0;
      let lastJumpTime = 0;
      const JUMP_COOLDOWN = 200; // ms，避免連續跳躍

      const Obstacle = class {
        constructor() {
          this.x = canvas.width;
          this.y = GROUND_Y;
          this.width = OBSTACLE_WIDTH;
          this.height = OBSTACLE_HEIGHT;
        }

        update() {
          this.x -= (5 + gameSpeed * 2);
        }

        draw() {
          ctx.fillStyle = '#ff6b6b';
          ctx.fillRect(this.x, this.y, this.width, this.height);
          ctx.strokeStyle = '#ff0000';
          ctx.lineWidth = 2;
          ctx.strokeRect(this.x, this.y, this.width, this.height);
        }

        isOffScreen() {
          return this.x + this.width < 0;
        }

        collidesWith(dx, dy, dw, dh) {
          return !(dx + dw < this.x || dx > this.x + this.width ||
                   dy + dh < this.y || dy > this.y + this.height);
        }
      };

      async function initHands() {
        hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/${file}`
        });

        hands.setOptions({
          maxNumHands: 2,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
          modelComplexity: 0
        });
      }

      function handCenter(landmarks) {
        if (!landmarks || landmarks.length === 0) return null;
        let sumX = 0, sumY = 0;
        for (let lm of landmarks) {
          sumX += lm.x;
          sumY += lm.y;
        }
        return {
          x: (sumX / landmarks.length) * canvas.width,
          y: (sumY / landmarks.length) * canvas.height
        };
      }

      function distanceBetween(p1, p2) {
        if (!p1 || !p2) return 999;
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function detectClapFromHands(results) {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length < 2) {
          handDetectorIndicator.textContent = '👋 手部偵測: 需要 2 隻手';
          handDetectorIndicator.classList.remove('active');
          return false;
        }

        const center1 = handCenter(results.multiHandLandmarks[0]);
        const center2 = handCenter(results.multiHandLandmarks[1]);
        const dist = distanceBetween(center1, center2);

        // 計算距離變化速度
        const now = Date.now();
        const timeDelta = Math.max(now - lastHandDistanceTime, 1);
        handDistanceVelocity = (lastHandDistance - dist) / timeDelta * 1000; // 每秒像素變化

        handDetectorIndicator.textContent = `👋 距離: ${(dist).toFixed(0)}px | 速度: ${handDistanceVelocity.toFixed(2)}px/s`;

        lastHandDistance = dist;
        lastHandDistanceTime = now;

        // 如果手快速靠近（距離快速減小），認為是拍手
        // 閾值：每秒靠近超過 200px
        if (handDistanceVelocity > 200) {
          handDetectorIndicator.classList.add('active');
          return true;
        } else {
          handDetectorIndicator.classList.remove('active');
          return false;
        }
      }

      function jump() {
        const now = Date.now();
        if (now - lastJumpTime > JUMP_COOLDOWN && !isJumping) {
          dinoVelocityY = -15; // 跳躍速度
          isJumping = true;
          lastJumpTime = now;
        }
      }

      function updateDino() {
        // 應用重力
        dinoVelocityY += GRAVITY;
        dinoY += dinoVelocityY;

        // 檢查是否著地
        if (dinoY >= GROUND_Y) {
          dinoY = GROUND_Y;
          dinoVelocityY = 0;
          isJumping = false;
        }
      }

      function drawDino() {
        ctx.fillStyle = '#5cfb6c';
        ctx.fillRect(dinoX, dinoY, DINO_WIDTH, DINO_HEIGHT);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 3;
        ctx.strokeRect(dinoX, dinoY, DINO_WIDTH, DINO_HEIGHT);
        // 眼睛
        ctx.fillStyle = '#000';
        ctx.fillRect(dinoX + 15, dinoY + 15, 8, 8);
      }

      function checkCollisions() {
        for (let i = obstacles.length - 1; i >= 0; i--) {
          if (obstacles[i].collidesWith(dinoX, dinoY, DINO_WIDTH, DINO_HEIGHT)) {
            endGame();
            return;
          }
        }
      }

      function endGame() {
        gameRunning = false;
        finalScoreDisplay.textContent = score;
        gameOverDiv.style.display = 'block';
      }

      async function processFrame() {
        if (!gameRunning) return;

        try {
          const results = await hands.process(videoElement);
          
          // 偵測拍手（手部快速靠近）
          const clapFromHands = detectClapFromHands(results);

          // 觸發跳躍
          if (clapFromHands) {
            jump();
          }
        } catch (err) {
          console.error('Detection error:', err);
        }

        requestAnimationFrame(processFrame);
      }

      function gameLoop() {
        if (!gameRunning) return;

        // 繪製背景
        ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 繪製地面
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(canvas.width, GROUND_Y);
        ctx.stroke();

        // 生成障礙物
        obstacleSpawnCounter++;
        if (obstacleSpawnCounter > obstacleSpawnRate) {
          obstacles.push(new Obstacle());
          obstacleSpawnCounter = 0;
          // 難度增加時，障礙物生成更頻繁
          obstacleSpawnRate = Math.max(80, 150 - score * 3);
        }

        // 更新並繪製障礙物
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].update();
          obstacles[i].draw();

          if (obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
            score++;
            scoreDisplay.textContent = score;

            // 每 5 分難度增加
            if (score % 5 === 0) {
              gameSpeed += 0.5;
              speedDisplay.textContent = gameSpeed.toFixed(1);
            }
          }
        }

        // 更新並繪製玩家
        updateDino();
        drawDino();

        // 檢查碰撞
        checkCollisions();

        requestAnimationFrame(gameLoop);
      }

      async function start() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
          });

          videoElement.srcObject = stream;
          
          videoElement.onloadedmetadata = async () => {
            videoElement.play();
            await initHands();
            processFrame();
            gameLoop();
          };
        } catch (err) {
          alert(`相機錯誤: ${err.message}`);
          console.error('Init error:', err);
        }
      }

      window.addEventListener('load', start);
      window.addEventListener('resize', () => {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
      });
    </script>
  </body>
</html>
