<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁版拍手偵測器 (Web Clap Detector)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
        }
        /* 隱藏原始的 video 標籤，我們只看 canvas 繪製的結果 */
        video {
            display: none;
        }
        canvas {
            border: 4px solid #ecf0f1;
            border-radius: 8px;
            background-color: #000;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <h2>拍手偵測器 (MediaPipe Web)</h2>
    
    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // 當 MediaPipe 處理完每一幀影像後會呼叫這個函式
        function onResults(results) {
            canvasCtx.save();
            // 清除畫布
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 為了讓畫面像照鏡子一樣，做水平翻轉
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            
            // 將影像畫到畫布上
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let clap = false;

            // 判斷是否有偵測到雙手
            if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                const hand1 = results.multiHandLandmarks[0];
                const hand2 = results.multiHandLandmarks[1];

                // 取得兩隻手第 0 個特徵點 (手腕/掌根) 的座標
                const x1 = hand1[0].x;
                const y1 = hand1[0].y;
                const x2 = hand2[0].x;
                const y2 = hand2[0].y;

                // 計算兩點之間的歐幾里得距離 (Euclidean distance)
                const distance = Math.sqrt(Math.pow(x1 - x2, 2) + Math.pow(y1 - y2, 2));

                // 距離小於 0.1 判定為拍手
                if (distance < 0.1) {
                    clap = true;
                }

                // 選擇性：將手的骨架畫出來方便除錯與觀看
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1});
                }
            }
            
            // 恢復畫布狀態，這樣畫文字的時候才不會是左右顛倒的
            canvasCtx.restore();

            // 繪製文字 (與 OpenCV 的 cv2.putText 類似)
            const text = clap ? "CLAP!" : "WAIT";
            const textColor = clap ? "#00FF00" : "#FF0000"; // 拍手顯示綠色，等待顯示紅色
            
            canvasCtx.font = "bold 60px Arial";
            canvasCtx.fillStyle = textColor;
            canvasCtx.fillText(text, 50, 80);
        }

        // 初始化 MediaPipe Hands 模型
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        // 綁定回呼函式
        hands.onResults(onResults);

        // 初始化攝影機
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        // 啟動攝影機
        camera.start();
    </script>
</body>
</html>
