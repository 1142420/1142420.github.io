<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clap Detector (Browser)</title>
    <style>
      body { font-family: Arial, sans-serif; background: #111; color: #eee; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
      video { border: 2px solid #444; border-radius: 8px; max-width: 100%; width: 640px; height: auto; }
      #status { margin-top: 16px; font-size: 2rem; font-weight: 700; }
      #debug { margin-top: 8px; font-size: 0.9rem; color: #888; max-width: 600px; line-height: 1.5; }
      .clap { color: #5cfb6c; }
      .wait { color: #f55; }
      .hint { margin-top: 8px; color: #bbb; }
    </style>
  </head>
  <body>
    <h1>Clap Detector (Browser)</h1>
    <video id="video" autoplay playsinline></video>
    <div id="status" class="wait">初始化中...</div>
    <div id="debug"></div>
    <div class="hint">按下「允許」後，對著鏡頭拍手。</div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script>
      const videoElement = document.getElementById('video');
      const statusEl = document.getElementById('status');
      const debugEl = document.getElementById('debug');
      
      let hands = null;
      let cameraRunning = false;

      async function setupCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
          });
          
          videoElement.srcObject = stream;
          
          return new Promise(resolve => {
            videoElement.onloadedmetadata = () => {
              videoElement.play();
              cameraRunning = true;
              resolve();
            };
          });
        } catch (err) {
          debugEl.textContent = `❌ 相機錯誤: ${err.message}`;
          statusEl.textContent = '無法使用相機';
          console.error('Camera error:', err);
          throw err;
        }
      }

      function handCenter(landmarks) {
        if (!landmarks || landmarks.length === 0) return null;
        let sumX = 0, sumY = 0;
        for (let lm of landmarks) {
          sumX += lm.x;
          sumY += lm.y;
        }
        return { 
          x: sumX / landmarks.length, 
          y: sumY / landmarks.length 
        };
      }

      function distanceBetween(p1, p2) {
        if (!p1 || !p2) return 999;
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      async function processFrame() {
        if (!cameraRunning || !hands) {
          requestAnimationFrame(processFrame);
          return;
        }

        try {
          const results = await hands.process(videoElement);
          
          if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            debugEl.textContent = `✅ 偵測到 ${results.multiHandLandmarks.length} 隻手`;
            
            if (results.multiHandLandmarks.length === 2) {
              const center1 = handCenter(results.multiHandLandmarks[0]);
              const center2 = handCenter(results.multiHandLandmarks[1]);
              const dist = distanceBetween(center1, center2);
              
              debugEl.textContent = `✅ 偵測到 2 隻手 | 距離: ${dist.toFixed(3)} ${dist < 0.15 ? '⚡' : ''}`;
              
              if (dist < 0.15) {
                statusEl.textContent = 'CLAP!';
                statusEl.className = 'clap';
              } else {
                statusEl.textContent = '等待偵測...';
                statusEl.className = 'wait';
              }
            } else {
              statusEl.textContent = '等待偵測...';
              statusEl.className = 'wait';
            }
          } else {
            debugEl.textContent = '⏳ 沒有偵測到手...';
            statusEl.textContent = '等待偵測...';
            statusEl.className = 'wait';
          }
        } catch (err) {
          console.error('Processing error:', err);
        }

        requestAnimationFrame(processFrame);
      }

      async function initialize() {
        try {
          debugEl.textContent = '📱 正在啟動相機...';
          await setupCamera();
          
          debugEl.textContent = '⏳ 正在初始化 MediaPipe Hands...';
          
          hands = new Hands({
            locateFile: (file) => {
              return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@latest/${file}`;
            }
          });

          hands.setOptions({
            maxNumHands: 2,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
            modelComplexity: 0
          });

          debugEl.textContent = '✅ MediaPipe 已初始化，開始偵測中...';
          statusEl.textContent = '等待偵測...';
          statusEl.className = 'wait';
          
          processFrame();
        } catch (err) {
          debugEl.textContent = `❌ 初始化失敗: ${err.message}`;
          console.error('Initialization error:', err);
        }
      }

      window.addEventListener('load', () => {
        initialize();
      });
    </script>
  </body>
</html>
